name: CI

on:
  push:
    branches: [main, master, "release/**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config libfuse2

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Web build
        run: npm run build:web

      - name: Tauri build
        run: npm run tauri build

      - name: Verify Linux bundles
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          shopt -s nullglob
          deb=(src-tauri/target/release/bundle/deb/*.deb)
          appimage=(src-tauri/target/release/bundle/appimage/*.AppImage)
          if (( ${#deb[@]} == 0 )); then
            echo "Missing .deb bundle"
            exit 1
          fi
          if (( ${#appimage[@]} == 0 )); then
            echo "Missing .AppImage bundle"
            exit 1
          fi

      - name: Verify macOS bundles
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          shopt -s nullglob
          dmg=(src-tauri/target/release/bundle/dmg/*.dmg)
          if (( ${#dmg[@]} == 0 )); then
            echo "Missing .dmg bundle"
            exit 1
          fi

      - name: Upload Windows bundles
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: diskpulse-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload unsigned Windows artifacts for SignPath
        id: upload-unsigned-windows-artifacts
        if: matrix.os == 'windows-latest' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/'))
        uses: actions/upload-artifact@v4
        with:
          name: diskpulse-windows-unsigned
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Submit SignPath signing request
        id: signpath
        if: matrix.os == 'windows-latest' && env.SIGNPATH_API_TOKEN != '' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/'))
        uses: signpath/github-action-submit-signing-request@v2
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: diskpulse
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installers
          github-artifact-id: ${{ steps.upload-unsigned-windows-artifacts.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-windows

      - name: Verify signed Windows artifacts
        if: matrix.os == 'windows-latest' && steps.signpath.outcome == 'success'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path signed-windows -Recurse -File
          if (-not $files) {
            Write-Error "Missing signed Windows artifacts"
            exit 1
          }
          $installers = $files | Where-Object { $_.Extension -in @('.msi', '.exe') }
          if (-not $installers) {
            Write-Error "Signed artifact directory does not contain MSI/EXE installers"
            exit 1
          }

      - name: Upload signed Windows artifacts
        if: matrix.os == 'windows-latest' && steps.signpath.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: diskpulse-windows-signed
          path: signed-windows/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux bundles
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: diskpulse-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS bundles
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: diskpulse-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
